<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OX 게임 — 진행자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
.wrap{width:100%;max-width:560px}
.pg{display:none;flex-direction:column;gap:12px}
.pg.on{display:flex}
.card{background:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 1px 5px rgba(0,0,0,.07)}
.btn{display:block;padding:12px 20px;font-size:14px;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:all .15s;text-align:center}
.btn-g{background:#1D9E75;color:#fff;width:100%}
.btn-g:hover{background:#0F6E56}
.btn-g:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:13px;background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;cursor:pointer}
.btn-sm:hover{background:#f5f5f5}
.btn-danger{background:#fff;border:1.5px solid #fcc;color:#E24B4A;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer}
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:600;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid transparent}
.chip-o{background:#E1F5EE;color:#085041;border-color:#1D9E75}
.chip-x{background:#FCEBEB;color:#791F1F;border-color:#E24B4A}
.chip-n{background:#f0f0f0;color:#555;border-color:#e0e0e0}
.zone{flex:1;border-radius:14px;padding:12px 14px;min-height:110px;border:2px dashed #ccc;display:flex;flex-direction:column;gap:8px}
.zo{border-color:#1D9E75;background:rgba(29,158,117,.05)}
.zx{border-color:#E24B4A;background:rgba(226,75,74,.05)}
.pbar{height:4px;background:#e8e8e8;border-radius:2px}
.pfill{height:4px;background:#1D9E75;border-radius:2px;transition:width .3s}
input[type=number]{padding:8px;font-size:14px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#111;text-align:center;outline:none;width:56px}
</style>
</head>
<body>
<div class="wrap">

<!-- 로비 -->
<div id="hp-lobby" class="pg on">
  <div style="font-size:22px;font-weight:700;color:#111;margin-bottom:2px">진행자 화면</div>
  <div style="font-size:14px;color:#888;margin-bottom:8px">참가자가 입장하면 게임을 시작하세요</div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:10px">
      입장한 참가자 <span id="pcnt" style="color:#1D9E75">0</span>명
    </div>
    <div id="plist" style="display:flex;flex-wrap:wrap;gap:7px;min-height:32px">
      <span style="font-size:13px;color:#bbb">아직 아무도 없어요</span>
    </div>
  </div>

  <button class="btn btn-g" id="startbtn" onclick="hStart()" disabled>게임 시작</button>
  <button class="btn-danger" onclick="hReset()" style="width:100%;display:block;text-align:center">초기화 (게임 리셋)</button>

  <div style="background:#f0faf5;border-radius:12px;padding:14px;font-size:13px">
    <div style="font-weight:600;color:#0F6E56;margin-bottom:4px">참가자 접속 링크를 공유하세요</div>
    <div style="color:#666;line-height:1.6">Claude.ai에서 참가자용 아티팩트를 열고,<br>우상단 <strong>공유 버튼 → 링크 복사</strong> 후 전달하세요</div>
  </div>
</div>

<!-- 게임 -->
<div id="hp-game" class="pg">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <span style="font-size:12px;color:#aaa" id="qnum">1 / 20</span>
      <span id="qtag" style="margin-left:6px"></span>
    </div>
    <span style="font-size:12px;color:#aaa" id="vstat"></span>
  </div>
  <div class="pbar"><div class="pfill" id="qbar" style="width:5%"></div></div>
  <div style="font-size:17px;font-weight:700;color:#111;line-height:1.5;padding:6px 0" id="qtext"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="zone zo">
      <div style="font-size:20px;font-weight:700;color:#0F6E56">O <span style="font-size:13px;font-weight:500" id="lbl-o"></span></div>
      <div id="zo" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div class="zone zx">
      <div style="font-size:20px;font-weight:700;color:#A32D2D">X <span style="font-size:13px;font-weight:500" id="lbl-x"></span></div>
      <div id="zx" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
  </div>

  <div class="card" style="padding:10px 14px">
    <div style="font-size:12px;color:#888;margin-bottom:6px">미응답</div>
    <div id="zn" style="display:flex;flex-wrap:wrap;gap:6px"><span style="font-size:13px;color:#bbb">없음 ✓</span></div>
  </div>

  <button class="btn btn-g" id="nextbtn" onclick="hNext()">다음 문항</button>
  <button class="btn-danger" onclick="hReset()" style="width:100%;display:block;text-align:center;margin-top:8px;padding:10px;border-radius:12px">초기화 (게임 리셋)</button>
</div>

<!-- 결과 -->
<div id="hp-result" class="pg">
  <div style="font-size:22px;font-weight:700;color:#111">팀 배정 결과</div>
  <div style="font-size:13px;color:#888">20문항 기반으로 다양한 성향이 골고루 배정됐어요</div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="font-size:13px;color:#666">팀 수</span>
    <input type="number" id="tn" value="4" min="2" max="6"/>
    <button class="btn-sm" onclick="buildTeams()" style="background:#1D9E75;color:#fff;border-color:#1D9E75">다시 배정</button>
    <button class="btn-danger" onclick="hReset()" style="margin-left:auto">처음부터</button>
  </div>
  <div id="teams"></div>
  <div id="dist"></div>
</div>

</div>
<script>
const DB="https://team-building-workshop-default-rtdb.asia-southeast1.firebasedatabase.app";
const G="/ox_v1";
const QS=[
  {q:"붕어빵",o:"팥",x:"슈크림"},
  {q:"메뉴 선택 부담없는 혼밥!",o:"아는 맛",x:"새로운 맛"},
  {q:"유명한 맛집, 웨이팅이 3시간이라면?",o:"그래도 기다려서 먹기",x:"웨이팅 없는 바로 옆 가게 (같은 메뉴)"},
  {q:"갑자기 생긴 초능력 1",o:"잠 안자도 멀쩡",x:"아무거나 먹어도 살 안 찜"},
  {q:"갑자기 생긴 초능력 2",o:"순간이동",x:"타임머신"},
  {q:"이런 환경에서 일해야 한다면?",o:"나 빼고 모두가 브레인인 팀",x:"내가 유일한 희망인 팀"},
  {q:"내 옆자리에 둘 중 하나만 앉혀야 한다면?",o:"맨날 회사 브이로그 찍는 팀원",x:"말 걸어도 단답만 하는 팀원"},
  {q:"일주일 스케줄이 걸린 선택",o:"일주일 내내 야근하기",x:"전직원 앞에서 장기자랑하고 일주일 쉬기"},
  {q:"?",o:"모르는게 상책",x:"모르는 개 산책"},
  {q:"밸런스 게임은 시간 낭비다",o:"O",x:"X"},
];
const TC=["#E24B4A","#378ADD","#1D9E75","#7F77DD","#BA7517","#D4537E"];
const TBG=["#FFECEC","#EBF5FF","#E1F5EE","#F0EEFF","#FFF5E0","#FFEAF3"];
const TTX=["#7a1f1f","#0C447C","#085041","#3C3489","#7a4a00","#72243E"];
const TN=["A팀","B팀","C팀","D팀","E팀","F팀"];
const ABG=["#E6F1FB","#E1F5EE","#FAECE7","#EEEDFE","#FAEEDA","#FBEAF0","#EAF3DE","#F1EFE8"];
const ATX=["#0C447C","#085041","#712B13","#3C3489","#633806","#72243E","#27500A","#444441"];

async function api(path,method,body){
  try{
    const r=await fetch(`${DB}${G}${path}.json`,method?{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}:{});
    return r.ok?await r.json():null;
  }catch{return null;}
}

let ps=[],curQ=0,answers={},timer=null;

function show(id){document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));document.getElementById(id).classList.add("on");}

function avColor(name){const i=ps.indexOf(name)%ABG.length;return[ABG[Math.max(0,i)],ATX[Math.max(0,i)]];}
function chip(name,cls){
  const[bg,tc]=avColor(name);
  return `<span class="chip ${cls}"><span class="av" style="width:20px;height:20px;font-size:10px;background:${bg};color:${tc}">${name.charAt(0)}</span>${name}</span>`;
}

async function init(){
  const meta=await api("/meta");
  if(meta&&meta.state==="playing"){
    curQ=meta.currentQ;
    const d=await api("/participants");
    ps=d?Object.keys(d):[];
    show("hp-game");renderQ();startPoll();
  } else if(meta&&meta.state==="done"){
    const d=await api("/participants");
    ps=d?Object.keys(d):[];
    answers=await api("/answers")||{};
    show("hp-result");buildTeams();
  } else {
    show("hp-lobby");lobbyPoll();
  }
}

function lobbyPoll(){
  if(timer)clearInterval(timer);
  timer=setInterval(async()=>{
    const d=await api("/participants");
    ps=d?Object.keys(d):[];
    document.getElementById("pcnt").textContent=ps.length;
    document.getElementById("startbtn").disabled=ps.length<2;
    document.getElementById("plist").innerHTML=ps.length
      ?ps.map((n,i)=>{const[bg,tc]=avColor(n);return`<span style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px 5px 6px;background:#f0f0f0;border-radius:20px;font-size:13px;color:#222"><span class="av" style="width:20px;height:20px;font-size:10px;background:${bg};color:${tc}">${n.charAt(0)}</span>${n}</span>`;}).join("")
      :'<span style="font-size:13px;color:#bbb">아직 아무도 없어요</span>';
  },1500);
}

async function hStart(){
  clearInterval(timer);curQ=0;
  await api("/meta","PUT",{state:"playing",currentQ:0});
  show("hp-game");renderQ();startPoll();
}

function startPoll(){
  if(timer)clearInterval(timer);
  timer=setInterval(async()=>{
    const d=await api("/answers");
    answers=d||{};renderZones();
  },1500);
  renderZones();
}

function renderQ(){
  const q=QS[curQ];
  document.getElementById("qnum").textContent=(curQ+1)+" / "+QS.length;
  document.getElementById("qbar").style.width=Math.round((curQ+1)/QS.length*100)+"%";
  document.getElementById("qtag").innerHTML="";
  document.getElementById("qtext").textContent=q.q;
  document.getElementById("lbl-o").textContent=q.o;
  document.getElementById("lbl-x").textContent=q.x;
  document.getElementById("nextbtn").textContent=curQ===QS.length-1?"결과 보기":"다음 문항";
}

function renderZones(){
  const qi=String(curQ);
  const ol=ps.filter(n=>answers[n]&&answers[n][qi]==="o");
  const xl=ps.filter(n=>answers[n]&&answers[n][qi]==="x");
  const nl=ps.filter(n=>!answers[n]||!answers[n][qi]);
  document.getElementById("zo").innerHTML=ol.map(n=>chip(n,"chip-o")).join("");
  document.getElementById("zx").innerHTML=xl.map(n=>chip(n,"chip-x")).join("");
  document.getElementById("zn").innerHTML=nl.length?nl.map(n=>chip(n,"chip-n")).join(""):'<span style="font-size:13px;color:#bbb">없음 ✓</span>';
  document.getElementById("vstat").textContent=(ol.length+xl.length)+" / "+ps.length+"명 응답";
}

async function hNext(){
  clearInterval(timer);
  if(curQ<QS.length-1){
    curQ++;
    await api("/meta/currentQ","PUT",curQ);
    renderQ();startPoll();
  } else {
    await api("/meta/state","PUT","done");
    answers=await api("/answers")||{};
    show("hp-result");buildTeams();
  }
}

function score(n){return QS.reduce((s,_,i)=>s+(answers[n]&&answers[n][String(i)]==="x"?1:0)*(i+1),0);}

async function buildTeams(){
  const cnt=Math.min(parseInt(document.getElementById("tn").value)||4,ps.length);
  const teams=Array.from({length:cnt},()=>[]);
  const sorted=[...ps].map(n=>({n,s:score(n)})).sort((a,b)=>a.s-b.s);
  let d=1,ti=0;
  sorted.forEach(p=>{teams[ti].push(p.n);ti+=d;if(ti>=cnt||ti<0){d*=-1;ti+=d;}});
  // Firebase에 팀 배정 저장
  const teamMap={};
  teams.forEach((ms,i)=>ms.forEach(m=>{teamMap[m]={team:TN[i],color:TC[i],bg:TBG[i],txt:TTX[i]};}));
  await api("/team_assignments","PUT",teamMap);

  document.getElementById("teams").innerHTML=teams.map((ms,i)=>`
    <div style="background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:${TC[i]}"></div>
        <span style="font-size:14px;font-weight:700;color:#111">${TN[i]}</span>
        <span style="font-size:12px;color:#888">${ms.length}명</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        ${ms.map(m=>`<span style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:${TBG[i]};border-radius:20px">
          <span class="av" style="width:26px;height:26px;font-size:12px;background:${TC[i]}33;color:${TTX[i]}">${m.charAt(0)}</span>
          <span style="font-size:13px;font-weight:700;color:${TTX[i]}">${m}</span>
        </span>`).join("")}
      </div>
    </div>`).join("");

  const rows=QS.map((q,i)=>{
    const oNames=ps.filter(n=>answers[n]&&answers[n][String(i)]==="o");
    const xNames=ps.filter(n=>answers[n]&&answers[n][String(i)]==="x");
    const pct=ps.length?Math.round(oNames.length/ps.length*100):50;
    const nameChip=(n,bg,tc)=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:${bg};border-radius:12px;font-size:12px;font-weight:500;color:${tc}"><span style="width:16px;height:16px;border-radius:50%;background:${tc}22;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${tc}">${n.charAt(0)}</span>${n}</span>`;
    return `<div style="padding:10px 0;border-bottom:1px solid #f0f0f0">
      <div style="font-size:13px;font-weight:600;color:#222;margin-bottom:8px">${q.q}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
            <span style="font-size:12px;font-weight:600;color:#1a6cb0;background:#EBF5FF;padding:2px 8px;border-radius:8px">${q.o} ${oNames.length}명</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${oNames.map(n=>nameChip(n,"#EBF5FF","#1a6cb0")).join("")||'<span style="font-size:12px;color:#bbb">없음</span>'}</div>
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
            <span style="font-size:12px;font-weight:600;color:#c0392b;background:#FFF0F0;padding:2px 8px;border-radius:8px">${q.x} ${xNames.length}명</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${xNames.map(n=>nameChip(n,"#FFF0F0","#c0392b")).join("")||'<span style="font-size:12px;color:#bbb">없음</span>'}</div>
        </div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("dist").innerHTML=`<div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)"><div style="font-size:14px;font-weight:700;color:#111;margin-bottom:4px">선택 분포</div><div style="font-size:12px;color:#aaa;margin-bottom:12px">각 문항별 누가 뭘 선택했는지 확인하세요</div>${rows}</div>`;
}

async function hReset(){
  if(!confirm("게임을 초기화할까요? 모든 데이터가 삭제됩니다."))return;
  clearInterval(timer);
  await api("","PUT",{meta:{state:"lobby",currentQ:0},participants:null,answers:null});
  ps=[];answers={};curQ=0;
  show("hp-lobby");lobbyPoll();
}

init();
</script>
</body>
</html>
