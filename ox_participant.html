<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>밸런스 게임</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;min-height:100vh}
.pg{display:none;flex-direction:column;min-height:100vh;padding:28px 20px}
.pg.on{display:flex}
.btn{display:block;width:100%;padding:15px;font-size:16px;font-weight:600;border:none;border-radius:14px;cursor:pointer;transition:all .15s;text-align:center}
.btn-g{background:#1D9E75;color:#fff}
.btn-g:hover{background:#0F6E56}
.btn-g:disabled{opacity:.35;cursor:not-allowed}
input[type=text]{width:100%;padding:14px;font-size:16px;border:1.5px solid #e0e0e0;border-radius:14px;background:#fff;color:#111;outline:none}
input:focus{border-color:#1D9E75}
.pbar{height:5px;background:#e8e8e8;border-radius:3px;margin:8px 0 4px}
.pfill{height:5px;background:#1D9E75;border-radius:3px;transition:width .4s}
.choice-wrap{display:flex;flex-direction:column;gap:14px;margin:20px 0}
.choice-btn{width:100%;padding:28px 22px;border:none;border-radius:20px;font-size:18px;font-weight:600;cursor:pointer;transition:all .18s;text-align:center;line-height:1.4}
.choice-btn:active{transform:scale(.97)}
.choice-btn.a{background:#378ADD;color:#fff}
.choice-btn.b{background:#E24B4A;color:#fff}
.choice-btn.picked-a{background:#378ADD;color:#fff;box-shadow:0 0 0 5px #85B7EB}
.choice-btn.picked-b{background:#E24B4A;color:#fff;box-shadow:0 0 0 5px #F09595}
.choice-btn.dim{opacity:.2;transform:scale(.93)}
.vs{text-align:center;font-size:13px;color:#ccc;font-weight:700;letter-spacing:2px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="pp-join" class="pg on">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px">
    <div>
      <div style="font-size:24px;font-weight:700;color:#111;margin-bottom:6px">밸런스 게임</div>
      <div style="font-size:14px;color:#888">이름을 입력하고 참가하세요</div>
    </div>
    <input type="text" id="ni" placeholder="예: 김플랫폼" maxlength="8"/>
    <button class="btn btn-g" id="jb" onclick="join()" disabled>참가하기</button>
    <div id="jerr" style="font-size:13px;color:#E24B4A;text-align:center;min-height:18px"></div>
  </div>
</div>

<div id="pp-wait" class="pg">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center">
    <div style="width:68px;height:68px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#1D9E75" stroke-width="2"/><path d="M12 7v5l3 3" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <div>
      <div style="font-size:20px;font-weight:700;color:#111" id="wname"></div>
      <div style="font-size:14px;color:#888;margin-top:6px">진행자가 게임을 시작할 때까지<br>기다려주세요</div>
    </div>
    <div style="font-size:13px;color:#bbb"><span class="spin"></span>대기 중...</div>
  </div>
</div>

<div id="pp-q" class="pg">
  <div style="margin-bottom:4px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:12px;color:#aaa" id="qnum">1 / 10</span>
    </div>
    <div class="pbar"><div class="pfill" id="qbar" style="width:10%"></div></div>
  </div>
  <div style="font-size:19px;font-weight:700;color:#111;line-height:1.5;margin:16px 0 4px" id="qtext"></div>
  <div class="choice-wrap">
    <button class="choice-btn a" id="bo" onclick="vote('o')"><span id="lo"></span></button>
    <div class="vs">VS</div>
    <button class="choice-btn b" id="bx" onclick="vote('x')"><span id="lx"></span></button>
  </div>
  <div id="vmsg" style="text-align:center;font-size:14px;font-weight:600;color:#1D9E75;min-height:22px"></div>
</div>

<div id="pp-done" class="pg">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center">
    <div style="font-size:56px">🎉</div>
    <div style="font-size:20px;font-weight:700;color:#111">게임 완료!</div>
    <div id="team-wait" style="font-size:14px;color:#aaa"><span class="spin"></span>팀 배정 대기 중...</div>
    <div id="team-result" style="display:none;width:100%">
      <div style="font-size:13px;color:#888;margin-bottom:10px">배정된 팀</div>
      <div id="team-badge" style="display:inline-flex;align-items:center;gap:12px;padding:18px 32px;border-radius:20px;font-size:24px;font-weight:700"></div>
      <div id="team-members" style="margin-top:16px;font-size:13px;color:#888"></div>
    </div>
  </div>
</div>

<script>
const DB="https://team-building-workshop-default-rtdb.asia-southeast1.firebasedatabase.app";
const G="/ox_v1";
const QS=[
  {q:"붕어빵",o:"팥",x:"슈크림"},
  {q:"메뉴 선택 부담없는 혼밥!",o:"아는 맛",x:"새로운 맛"},
  {q:"유명한 맛집, 웨이팅이 3시간이라면?",o:"그래도 기다려서 먹기",x:"웨이팅 없는 바로 옆 가게 (같은 메뉴)"},
  {q:"갑자기 생긴 초능력 1",o:"잠 안자도 멀쩡",x:"아무거나 먹어도 살 안 찜"},
  {q:"갑자기 생긴 초능력 2",o:"순간이동",x:"타임머신"},
  {q:"이런 환경에서 일해야 한다면?",o:"나 빼고 모두가 브레인인 팀",x:"내가 유일한 희망인 팀"},
  {q:"내 옆자리에 둘 중 하나만 앉혀야 한다면?",o:"맨날 회사 브이로그 찍는 팀원",x:"말 걸어도 단답만 하는 팀원"},
  {q:"일주일 스케줄이 걸린 선택",o:"일주일 내내 야근하기",x:"전직원 앞에서 장기자랑하고 일주일 쉬기"},
  {q:"?",o:"모르는게 상책",x:"모르는 개 산책"},
  {q:"밸런스 게임은 시간 낭비다",o:"O",x:"X"},
];

async function api(path,method,body){
  try{
    const r=await fetch(`${DB}${G}${path}.json`,method?{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}:{});
    return r.ok?await r.json():null;
  }catch{return null;}
}

let myName="",curQ=-1,timer=null,teamPollTimer=null;

const ni=document.getElementById("ni");
ni.addEventListener("input",()=>document.getElementById("jb").disabled=!ni.value.trim());
ni.addEventListener("keydown",e=>{if(e.key==="Enter"&&ni.value.trim())join();});

function show(id){document.querySelectorAll(".pg").forEach(p=>p.classList.remove("on"));document.getElementById(id).classList.add("on");}

async function join(){
  const v=ni.value.trim();if(!v)return;
  document.getElementById("jb").disabled=true;
  document.getElementById("jerr").textContent="";
  const ps=await api("/participants");
  if(ps&&ps[v]){
    document.getElementById("jerr").textContent="이미 같은 이름이 있어요. 다른 이름을 써주세요.";
    document.getElementById("jb").disabled=false;
    return;
  }
  myName=v;
  await api("/participants","PATCH",{[v]:true});
  document.getElementById("wname").textContent=v+"님, 환영해요!";
  show("pp-wait");
  timer=setInterval(poll,1500);poll();
}

async function poll(){
  const meta=await api("/meta");
  if(!meta)return;
  if(meta.state==="done"){
    clearInterval(timer);
    show("pp-done");
    teamPollTimer=setInterval(pollTeam,2000);pollTeam();
    return;
  }
  if(meta.state!=="playing")return;
  if(meta.currentQ!==curQ){
    curQ=meta.currentQ;
    renderQ(curQ);
    show("pp-q");
  }
  const ans=await api(`/answers/${myName}/${curQ}`);
  ans?showVoted(ans):resetUI();
}

function renderQ(qi){
  const q=QS[qi];
  document.getElementById("qnum").textContent=(qi+1)+" / "+QS.length;
  document.getElementById("qbar").style.width=Math.round((qi+1)/QS.length*100)+"%";
  document.getElementById("qtext").textContent=q.q;
  document.getElementById("lo").textContent=q.o;
  document.getElementById("lx").textContent=q.x;
  resetUI();
}
function resetUI(){
  document.getElementById("bo").className="choice-btn a";
  document.getElementById("bx").className="choice-btn b";
  document.getElementById("vmsg").textContent="";
}
function showVoted(ans){
  document.getElementById("bo").className="choice-btn a"+(ans==="o"?" picked-a":" dim");
  document.getElementById("bx").className="choice-btn b"+(ans==="x"?" picked-b":" dim");
  document.getElementById("vmsg").textContent="선택 완료!";
}
async function vote(ans){
  if(curQ<0)return;
  showVoted(ans);
  await api(`/answers/${myName}/${curQ}`,"PUT",ans);
}

async function pollTeam(){
  const data=await api("/team_assignments");
  if(!data||!data[myName])return;
  clearInterval(teamPollTimer);
  const t=data[myName];
  // 같은 팀원 목록
  const teammates=Object.entries(data).filter(([n,v])=>v.team===t.team&&n!==myName).map(([n])=>n);
  document.getElementById("team-wait").style.display="none";
  document.getElementById("team-result").style.display="block";
  const badge=document.getElementById("team-badge");
  badge.style.background=t.bg;
  badge.style.color=t.txt;
  badge.innerHTML=`<span style="width:14px;height:14px;border-radius:50%;background:${t.color};display:inline-block;flex-shrink:0"></span>${t.team}`;
  document.getElementById("team-members").innerHTML=teammates.length
    ?`같은 팀: ${teammates.map(n=>`<strong style="color:#333">${n}</strong>`).join(", ")}`
    :"";
}
</script>
</body>
</html>
